  <text x="600" y="210" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="70" font-weight="800" fill="#fff7ed">SING WAI FC</text>
  <text x="600" y="265" text-anchor="middle" font-family="'Noto Sans CJK HK', 'Microsoft JhengHei', sans-serif" font-size="42" font-weight="700" fill="#fbbf24">聲威足球會 重製版</text>
