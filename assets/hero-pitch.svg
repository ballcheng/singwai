<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Retro football pitch illustration</title>
  <desc id="desc">A stylised football pitch with retro web graphics and Hong Kong night lights.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f0711"/>
      <stop offset="1" stop-color="#64111c"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#991b1b"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <pattern id="stripe" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="40" height="80" fill="rgba(255,255,255,0.05)"/>
      <rect x="40" width="40" height="80" fill="rgba(0,0,0,0.04)"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="620" fill="url(#sky)"/>
  <g opacity="0.55">
    <rect x="98" y="128" width="38" height="190" fill="#53101a"/>
    <rect x="156" y="88" width="52" height="230" fill="#6b1220"/>
    <rect x="233" y="142" width="34" height="176" fill="#5a1320"/>
    <rect x="910" y="114" width="48" height="205" fill="#53101a"/>
    <rect x="980" y="72" width="58" height="247" fill="#6b1220"/>
    <rect x="1064" y="135" width="36" height="184" fill="#5a1320"/>
    <g fill="#fbbf24" opacity="0.8">
      <rect x="170" y="113" width="8" height="8"/><rect x="188" y="145" width="8" height="8"/><rect x="994" y="102" width="8" height="8"/><rect x="1017" y="139" width="8" height="8"/><rect x="926" y="151" width="8" height="8"/>
    </g>
  </g>
  <g filter="url(#glow)">
    <circle cx="160" cy="105" r="9" fill="#fff7ed"/><circle cx="1040" cy="96" r="9" fill="#fff7ed"/>
    <path d="M160 105l-70 280M1040 96l70 290" stroke="#fff7ed" stroke-width="6" opacity=".6"/>
  </g>
  <path d="M0 360C210 310 393 298 600 318c211 20 381 1 600 47v255H0z" fill="url(#field)"/>
  <path d="M0 360C210 310 393 298 600 318c211 20 381 1 600 47v255H0z" fill="url(#stripe)" opacity=".55"/>
  <g stroke="#fff7ed" stroke-width="6" fill="none" opacity=".9">
    <path d="M155 413h890v153H155z"/>
    <path d="M600 320v247"/>
    <ellipse cx="600" cy="493" rx="96" ry="51"/>
    <path d="M155 457h83v65h-83M1045 457h-83v65h83"/>
  </g>
  <g transform="translate(546 398)">
    <circle cx="55" cy="55" r="44" fill="#fff" stroke="#64111c" stroke-width="5"/>
    <path d="M55 15l17 12-7 22H45l-7-22zM26 45l19 4-3 22-18 6-12-17zM84 45l14 15-12 17-18-6-3-22zM41 88l14-13 14 13-6 18H47z" fill="#64111c"/>
