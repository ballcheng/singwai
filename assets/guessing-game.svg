<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" role="img" aria-labelledby="title desc">
  <title id="title">Football prediction challenge illustration</title>
  <desc id="desc">Retro computer screen showing a football prediction ranking table.</desc>
  <rect width="1000" height="600" rx="40" fill="#3f0711"/>
  <rect x="105" y="65" width="790" height="430" rx="24" fill="#c8d4d7"/>
  <rect x="140" y="100" width="720" height="330" fill="#64111c"/>
  <rect x="140" y="100" width="720" height="54" fill="#b91c1c"/>
  <text x="172" y="137" font-family="Verdana" font-size="26" font-weight="700" fill="#fff7ed">Prediction Challenge 98/99</text>
