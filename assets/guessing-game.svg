    <text x="175" y="370">3</text><text x="235" y="370">Member C</text><text x="550" y="370">79</text><text x="665" y="370">D W W L</text>
  </g>
  <rect x="390" y="495" width="220" height="42" rx="12" fill="#c8d4d7"/>
  <rect x="326" y="535" width="348" height="28" rx="10" fill="#96a0a3"/>
  <circle cx="785" cy="128" r="14" fill="#ff6b6b"/>
