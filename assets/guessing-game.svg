    <text x="175" y="205">#</text><text x="235" y="205">Player</text><text x="540" y="205">Pts</text><text x="665" y="205">Form</text>
    <line x1="170" y1="225" x2="820" y2="225" stroke="#fbbf24" stroke-width="3"/>
