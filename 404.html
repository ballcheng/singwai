<!doctype html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — 聲威足球會</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="section">
    <div class="container simple-404"><img src="assets/sw-logo.png" alt="Sing Wai Football Club logo" class="notfound-logo">
      <p class="section-kicker">404</p>
      <h1>頁面唔存在</h1>
      <p>呢個重製版係單頁靜態網站，請返回首頁。</p>
      <a class="btn primary" href="index.html">返回首頁</a>
    </div>
  </main>

  <div class="music-player" aria-label="Background music player">
    <audio data-bg-music preload="none">
      <source src="assets/audio/singwai.mp3" type="audio/mpeg">
      <source src="assets/audio/singwai.ogg" type="audio/ogg">
      <source src="assets/original/singwai.mid" type="audio/midi">
    </audio>
    <button class="music-toggle" type="button" data-music-toggle aria-pressed="false">播放背景音樂 Play music</button>
    <span class="music-status" data-music-status>已轉成 MP3/OGG；按下播放</span>
  </div>
  <script src="assets/music.js"></script>
</body>
</html>
